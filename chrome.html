    <script type="text/javascript">

      function redirect() {
        var url = "http://www.A1.com?sc-command=sc_cmd_override&amp;nonce=blk_5gea9xtddfprpbzev";

        if (url.length > 0) {
          window.location.href = url;
          return true;
        }
        return false;
      }

      function historyBackWFallback(fallbackUrl) {
        fallbackUrl = fallbackUrl || '/';
        var prevPage = window.location.href;
        if (prevPage.endsWith("#"))
          prevPage = prevPage.substring(0, prevPage.length - 1);

        window.history.go(-1);

        setTimeout(function () {
          var currPage = window.location.href;
          if (currPage.endsWith("#"))
            currPage = currPage.substring(0, currPage.length - 1);

          if (currPage == prevPage) {
            window.location.href = fallbackUrl;
          }
        }, 500);
      }
